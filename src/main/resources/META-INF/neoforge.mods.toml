modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://example.com/worldguardneo/issues"

# Mixin configuration. Loads WorldGuardNeo's random-tick gating mixins for ice/snow/grass/etc.
[[mixins]]
config="worldguardneo.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
displayURL="https://example.com/worldguardneo"

# NeoForge + Minecraft — server-side mod, so SERVER side.
[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="SERVER"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="SERVER"

# WorldEdit — OPTIONAL for loading, REQUIRED for creating regions: /rg claim and /rg redefine
# read the player's WorldEdit selection (//wand, //pos1/2, //sel poly). Without WorldEdit the mod
# still loads and ALL other commands + protection work; only claim/redefine are unavailable.
# Made optional so a missing WorldEdit can never silently disable the whole mod (which is exactly
# what "required" did — NeoForge refuses to load the mod, so NO commands register at all).
[[dependencies.${mod_id}]]
modId="worldedit"
type="optional"
versionRange="[7.3,)"
ordering="AFTER"
side="SERVER"

# LuckPerms — optional permission backend; falls back to OP levels if missing.
[[dependencies.${mod_id}]]
modId="luckperms"
type="optional"
versionRange="[5.4,)"
ordering="AFTER"
side="SERVER"

# Bluemap — optional 3D web-map integration. WGN regions render as ShapeMarkers if present.
[[dependencies.${mod_id}]]
modId="bluemap"
type="optional"
versionRange="*"
ordering="AFTER"
side="SERVER"

# Squaremap — optional 2D web-map integration. WGN regions render as a marker layer if present.
[[dependencies.${mod_id}]]
modId="squaremap"
type="optional"
versionRange="*"
ordering="AFTER"
side="SERVER"
