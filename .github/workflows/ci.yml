name: CI

# Runs the test layers on every push and pull request.
# This workflow lives on the region-tests branch, which carries the mod source plus both test
# layers: the pure-JVM engine suite (tests/) and the in-game GameTest battery
# (src/main/java/.../gametest/WGNGameTests.java).
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, deterministic engine tests — the primary gate. ~500k assertions, no Minecraft runtime.
  jvm-tests:
    name: JVM engine tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build (compile main classes, skip gradle test task)
        run: ./gradlew build -x test --no-daemon --stacktrace
      - name: Run pure-JVM engine suite
        run: bash tests/run.sh

  # In-game GameTests — exercise the real event/mixin enforcement path in a live ServerLevel.
  # Heavier (downloads NeoForge/Minecraft and boots a dedicated gametest server). This is a
  # BLOCKING gate: the full battery (~166 real enforcement tests) must pass for the workflow to go green. The
  # NeoForge gametest runner exits non-zero on any failure, so a red mark here means a real
  # regression in the enforcement path — fix it. Reproduce locally with:
  #   ./gradlew runGameTestServer
  gametest:
    name: In-game GameTests (NeoForge ${{ matrix.neo }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Run the full battery against several NeoForge 21.1.x releases so a loader-side change in the
      # series (event/mixin signature, registry tweak) is caught. fail-fast:false → one version going
      # red doesn't cancel the others, so we see exactly which version regressed. -Pneo_version
      # overrides the gradle.properties default.
      #
      # Floor is 21.1.209: the GAMETEST battery posts MobEffectEvent.Applicable, whose constructor
      # gained its `source` parameter after 21.1.172, so the tests don't COMPILE below ~209. The mod
      # itself still compiles on the full declared range ([21.1.0,)); only the test harness needs the
      # newer event ctor. Keep entries to actually-released 21.1.x builds at or above the floor.
      fail-fast: false
      matrix:
        neo: ['21.1.209', '21.1.221', '21.1.234']
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run GameTest server (NeoForge ${{ matrix.neo }})
        run: ./gradlew runGameTestServer -Pneo_version=${{ matrix.neo }} --no-daemon --stacktrace
